<svg xmlns="http://www.w3.org/2000/svg" width="48" height="54" viewBox="0 0 80 85">
  <style>
    .whole{animation:jump 0.85s ease-in-out infinite;transform-origin:40px 80px}
    .re{transform-origin:24px 18px;animation:eW 2s ease-in-out infinite}
    .re2{transform-origin:52px 18px;animation:eW 2s ease-in-out infinite .2s}
    .rel{animation:bR 4s ease-in-out infinite;transform-origin:30px 52px}
    .rer{animation:bR 4s ease-in-out infinite .1s;transform-origin:46px 52px}
    @keyframes jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes eW{0%,100%{transform:rotate(0)}30%{transform:rotate(-10deg)}65%{transform:rotate(7deg)}}
    @keyframes bR{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(0.08)}}
  </style>
  <g class="whole">
    <g class="re"><ellipse cx="24" cy="20" rx="8" ry="20" fill="#faf8f4" stroke="#c2185b" stroke-width="1.5"/><ellipse cx="24" cy="20" rx="4.5" ry="14" fill="#ffb3c6"/></g>
    <g class="re2"><ellipse cx="52" cy="20" rx="8" ry="20" fill="#faf8f4" stroke="#c2185b" stroke-width="1.5"/><ellipse cx="52" cy="20" rx="4.5" ry="14" fill="#ffb3c6"/></g>
    <circle cx="38" cy="56" r="24" fill="#faf8f4" stroke="#c2185b" stroke-width="1.5"/>
    <g class="rel"><circle cx="30" cy="52" r="4.5" fill="#2d2a24"/><circle cx="31.5" cy="50.5" r="1.3" fill="white"/></g>
    <g class="rer"><circle cx="46" cy="52" r="4.5" fill="#2d2a24"/><circle cx="47.5" cy="50.5" r="1.3" fill="white"/></g>
    <ellipse cx="38" cy="59" rx="3.5" ry="2.5" fill="#c2185b"/>
    <path d="M34 63 Q38 67 42 63" fill="none" stroke="#c2185b" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="24" cy="59" r="5.5" fill="#ffb3c6" opacity="0.45"/>
    <circle cx="52" cy="59" r="5.5" fill="#ffb3c6" opacity="0.45"/>
  </g>
</svg>
